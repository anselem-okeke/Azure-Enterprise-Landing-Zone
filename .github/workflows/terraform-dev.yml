name: Terraform Dev

on:
  push:
    branches:
      - main
      - master
      - dev
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-dev.yml"

  pull_request:
    branches:
      - main
      - master
      - dev
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-dev.yml"

  workflow_dispatch:
    inputs:
      trusted_admin_ip:
        description: "Your current public IP in CIDR format, e.g. 1.2.3.4/32"
        required: true
        type: string
      run_aks_smoke:
        description: "Run AKS smoke checks after Terraform plan"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: terraform-dev-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.8.5"
  TF_ROOT: terraform
  TF_ENV_DIR: terraform/envs/dev
  TF_IN_AUTOMATION: true

jobs:
  checks:
    name: Checks - fmt, init, validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform format check
        working-directory: ${{ env.TF_ROOT }}
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        working-directory: ${{ env.TF_ENV_DIR }}
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        working-directory: ${{ env.TF_ENV_DIR }}
        run: terraform validate

  plan:
    name: Plan - dev
    runs-on: [self-hosted, Linux, X64]
    needs: checks
    if: github.event_name == 'workflow_dispatch'

    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      TF_VAR_trusted_admin_ip: ${{ inputs.trusted_admin_ip }}
      TF_VAR_ssh_public_key: ${{ secrets.TF_VAR_ssh_public_key }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify runner prerequisites
        run: |
          node --version
          unzip -v | head -n 1
          curl --version | head -n 1
          az version | head -n 20

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init
        working-directory: ${{ env.TF_ENV_DIR }}
        run: terraform init -input=false

      - name: Terraform plan
        working-directory: ${{ env.TF_ENV_DIR }}
        run: terraform plan -input=false -no-color -out=tfplan | tee plan.txt

      - name: Upload human-readable plan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-dev-text
          path: ${{ env.TF_ENV_DIR }}/plan.txt

      - name: Upload binary plan
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-dev-binary
          path: ${{ env.TF_ENV_DIR }}/tfplan

  aks-smoke:
    name: AKS Smoke - dev
    runs-on: [self-hosted, Linux, X64]
    needs: plan
    if: github.event_name == 'workflow_dispatch' && inputs.run_aks_smoke == true

    permissions:
      contents: read
      id-token: write

    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Show Azure account
        run: az account show -o table

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-spoke-dev-network \
            --name aks-dev-we-01 \
            --overwrite-existing

      - name: AKS smoke checks
        run: |
          kubectl get nodes -o wide
          kubectl get pods -A