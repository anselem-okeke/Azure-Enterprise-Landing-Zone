name: Terraform Dev

on:
  push:
    branches:
      - main
      - master
      - dev
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-dev.yml"

  pull_request:
    branches:
      - main
      - master
      - dev
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-dev.yml"

  workflow_dispatch:
    inputs:
      run_aks_smoke:
        description: "Run AKS smoke checks after Terraform plan"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: terraform-dev-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.8.5"
  TF_ROOT: terraform
  TF_ENV_DIR: terraform/envs/dev
  TF_IN_AUTOMATION: true

jobs:
  checks:
    name: Checks - fmt, init, validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform format check
        working-directory: ${{ env.TF_ROOT }}
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        working-directory: ${{ env.TF_ENV_DIR }}
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        working-directory: ${{ env.TF_ENV_DIR }}
        env:
          TF_VAR_ssh_public_key: ${{ secrets.TF_VAR_ssh_public_key }}
        run: terraform validate

  plan:
    name: Plan - dev
    runs-on: [self-hosted, Linux, X64]
    needs: checks
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'

    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.TF_VAR_SSH_PUBLIC_KEY }}
      TF_VAR_postgres_admin_password: ${{ secrets.TF_VAR_POSTGRES_ADMIN_PASSWORD }}
      TF_VAR_jumpbox_public_ip: ${{ vars.TF_VAR_JUMPBOX_PUBLIC_IP }}
      TF_VAR_aks_egress_public_ip: ${{ vars.TF_VAR_AKS_EGRESS_PUBLIC_IP }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify runner prerequisites
        run: |
          node --version
          unzip -v | head -n 1
          curl --version | head -n 1
          az version | head -n 20

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init
        working-directory: ${{ env.TF_ENV_DIR }}
        run: terraform init -input=false

      - name: Terraform plan
        working-directory: ${{ env.TF_ENV_DIR }}
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Render human-readable plan
        working-directory: ${{ env.TF_ENV_DIR }}
        run: terraform show -no-color tfplan > plan.txt

      - name: Verify plan artifacts
        working-directory: ${{ env.TF_ENV_DIR }}
        run: |
          pwd
          ls -lah
          test -f tfplan
          test -f plan.txt

      - name: Build PR plan summary
        if: github.event_name == 'pull_request'
        working-directory: ${{ env.TF_ENV_DIR }}
        run: |
          PLAN_SUMMARY=$(grep -E '^Plan: [0-9]+ to add, [0-9]+ to change, [0-9]+ to destroy\.$' plan.txt | tail -n 1)

          {
            echo "## Terraform Plan - dev"
            echo ""
            echo "**Status:** Plan succeeded"
            echo "**Workflow:** \`${{ github.workflow }}\`"
            echo "**Run ID:** \`${{ github.run_id }}\`"
            echo "**Commit:** \`${{ github.sha }}\`"
            echo ""
            echo "**Workflow run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "**Summary:**"
            echo ""
            echo "\`${PLAN_SUMMARY:-Plan summary not found}\`"
            echo ""
            echo "_Full plan is available in the workflow artifacts._"
          } > pr-comment.md

      - name: Upload human-readable plan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-dev-text
          path: ${{ env.TF_ENV_DIR }}/plan.txt

      - name: Upload binary plan
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-dev-binary
          path: ${{ env.TF_ENV_DIR }}/tfplan

      - name: Upload PR comment draft
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-pr-comment
          path: ${{ env.TF_ENV_DIR }}/pr-comment.md

      - name: Comment plan summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '${{ env.TF_ENV_DIR }}/pr-comment.md';
            const body = fs.readFileSync(path, 'utf8');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const marker = '<!-- terraform-dev-plan-comment -->';
            const finalBody = `${marker}\n${body}`;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });

            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: finalBody,
              });
              core.info(`Updated existing PR comment: ${existing.id}`);
            } else {
              const created = await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: finalBody,
              });
              core.info(`Created new PR comment: ${created.data.id}`);
            }

  aks-smoke:
    name: AKS Smoke - dev
    runs-on: [self-hosted, Linux, X64]
    needs: plan
    if: github.event_name == 'workflow_dispatch' && inputs.run_aks_smoke == true

    permissions:
      contents: read
      id-token: write

    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Show Azure account
        run: az account show -o table

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-spoke-dev-network \
            --name aks-dev-we-01 \
            --overwrite-existing

      - name: AKS smoke checks
        run: |
          kubectl get nodes -o wide
          kubectl get pods -A