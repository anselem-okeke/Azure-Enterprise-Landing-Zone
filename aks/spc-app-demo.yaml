apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: app-demo-kv
  namespace: app-demo
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "ed2813f6-7053-43ed-90ae-05878e25de91"
    keyvaultName: "kvanselemdevwe01"
    tenantId: "53272ac8-b903-4843-8ff8-92d8b538e8f2"
    objects: |
      array:
        - |
          objectName: db-host
          objectType: secret
        - |
          objectName: db-name
          objectType: secret
        - |
          objectName: db-username
          objectType: secret
        - |
          objectName: db-password
          objectType: secret
        - |
          objectName: db-port
          objectType: secret
        - |
          objectName: db-connection-string
          objectType: secret
