apiVersion: v1
kind: Pod
metadata:
  name: kv-test
  namespace: app-demo
  labels:
    azure.workload.identity/use: "true"
spec:
  serviceAccountName: app-demo-sa
  containers:
    - name: busybox
      image: busybox:1.36
      command: ["/bin/sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: secrets-store
          mountPath: /mnt/secrets-store
          readOnly: true
  volumes:
    - name: secrets-store
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: app-demo-kv
