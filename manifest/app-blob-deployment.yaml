apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-blob-demo
  namespace: app-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-blob-demo
  template:
    metadata:
      labels:
        app: app-blob-demo
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: app-demo-blob-sa
      containers:
        - name: app
          image: python:3.12-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install --no-cache-dir azure-identity azure-storage-blob && python -u /app/app.py
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          volumeMounts:
            - name: app-code
              mountPath: /app
      volumes:
        - name: app-code
          configMap:
            name: app-blob-code
